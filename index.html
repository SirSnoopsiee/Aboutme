<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sirsnoopy | Coder</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/code-andrewy/Images/refs/heads/main/c0e9641a-6ab6-4aae-87ee-11a4ff2da95d.sketchpad%20(1).png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --blue: #00d2ff;
            --yellow: #ffde59;
            --glass: rgba(15, 20, 35, 0.75);
            --border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --muted: #cbd5e1;
            --github: #24292e;
            --youtube: #FF0000;
            --discord: #5865F2;
        }

        /* Disable Selection */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            padding: 20px;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
                url('https://raw.githubusercontent.com/code-andrewy/jumpman64beta/refs/heads/main/charlie-brown-snoopy-stargazing-desktop-wallpaper-preview.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow: hidden;
        }

        /* Custom Right Click Menu */
        #context-menu {
            position: fixed;
            background: rgba(20, 25, 40, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px;
            width: 180px;
            display: none;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .menu-item {
            padding: 10px 14px;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .menu-item i {
            color: var(--blue);
            font-size: 0.9rem;
        }

        /* Ripple Click Effect */
        .ripple {
            position: fixed;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: rippleEffect 0.5s ease-out forwards;
            z-index: 9999;
        }

        @keyframes rippleEffect {
            to {
                width: 120px;
                height: 120px;
                opacity: 0;
            }
        }

        .container {
            perspective: 1500px;
            width: 100%;
            max-width: 1000px;
            z-index: 10;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 36px;
            padding: clamp(30px, 5vw, 55px);
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            position: relative;
        }

        .card-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 255, 255, 0.1), transparent 50%);
            pointer-events: none;
            z-index: 3;
            border-radius: inherit;
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            z-index: 2;
        }

        .pfp-outer {
            width: clamp(170px, 22vw, 230px);
            height: clamp(170px, 22vw, 230px);
            background: var(--yellow);
            border-radius: 50%;
            padding: 6px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pfp-outer:hover {
            transform: scale(1.05);
        }

        .pfp-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid rgba(0, 0, 0, 0.15);
        }

        .pfp-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content-section {
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .greeting {
            color: var(--blue);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 800;
            font-size: 0.75rem;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .name-logo {
            max-width: 320px;
            width: 100%;
            filter: drop-shadow(0 8px 15px rgba(0, 0, 0, 0.4));
            margin-bottom: 10px;
        }

        .typewriter-wrap {
            font-size: clamp(1.2rem, 2.5vw, 1.7rem);
            font-weight: 700;
            min-height: 1.5em;
        }

        .bio {
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.8;
            background: rgba(0, 0, 0, 0.3);
            padding: 18px 24px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            border-color: var(--blue);
        }

        .stat-box i {
            font-size: 1.4rem;
            color: var(--blue);
        }

        .stat-val {
            font-weight: 700;
            font-size: 1.1rem;
            display: block;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .social-row {
            display: flex;
            gap: 14px;
        }

        .social-btn {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border);
            color: white;
            font-size: 1.3rem;
            display: grid;
            place-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .social-btn:hover {
            transform: translateY(-10px) scale(1.1);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .btn-github:hover {
            background: var(--github);
        }

        .btn-youtube:hover {
            background: var(--youtube);
        }

        .btn-discord:hover {
            background: var(--discord);
        }

        @media (min-width: 850px) {
            .card {
                grid-template-columns: 300px 1fr;
                align-items: center;
            }

            .profile-section {
                border-right: 1px solid var(--border);
                padding-right: 40px;
            }
        }

        @media (max-width: 600px) {
            .card {
                padding: 30px 20px;
                border-radius: 28px;
                margin: 10px;
            }

            .profile-section {
                border-right: none;
            }

            .social-row {
                justify-content: center;
            }

            .name-logo {
                max-width: 260px;
                margin: 0 auto;
                display: block;
            }

            .greeting {
                text-align: center;
            }
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div id="context-menu">
        <div class="menu-item" onclick="location.reload()"><i class="fa-solid fa-rotate"></i> Refresh Page</div>
        <div class="menu-item" onclick="navigator.clipboard.writeText(window.location.href); alert('Link Copied!')"><i class="fa-solid fa-link"></i> Copy URL</div>
        <div class="menu-item" onclick="document.getElementById('context-menu').style.display='none'"><i class="fa-solid fa-xmark"></i> Close Menu</div>
    </div>

    <div class="container" id="tilt-container">
        <main class="card" id="tilt-card">
            <div class="card-glow" id="glow"></div>

            <div class="profile-section">
                <div class="pfp-outer">
                    <div class="pfp-inner">
                        <img src="https://raw.githubusercontent.com/code-andrewy/Images/refs/heads/main/c0e9641a-6ab6-4aae-87ee-11a4ff2da95d.sketchpad%20(1).png" alt="Sirsnoopy Avatar" class="pfp-img">
                    </div>
                </div>
                <div class="social-row">
                    <a href="https://github.com/code-andrewy" target="_blank" class="social-btn btn-github"><i class="fa-brands fa-github"></i></a>
                    <a href="https://www.youtube.com/@SirSnoopsiee" target="_blank" class="social-btn btn-youtube"><i class="fa-brands fa-youtube"></i></a>
                    <a href="https://discord.com/users/1453900770524266516" target="_blank" class="social-btn btn-discord"><i class="fa-brands fa-discord"></i></a>
                </div>
            </div>

            <div class="content-section">
                <div>
                    <p class="greeting">Hello 👋 my name is</p>
                    <img src="https://raw.githubusercontent.com/code-andrewy/Images/refs/heads/main/download__7_-removebg-preview.png" alt="Andrew" class="name-logo">
                </div>

                <div class="typewriter-wrap">
                    Experience in <span id="typewriter" style="color:var(--blue)"></span><span style="border-left:3px solid var(--blue); margin-left:4px; animation:blink 0.8s infinite"></span>
                </div>

                <p class="bio">A student who started coding at age 12. I make and find cool stuff</p>

                <div class="info-grid">
                    <div class="stat-box">
                        <i class="fa-regular fa-clock"></i>
                        <div>
                            <span class="stat-val" id="time">00:00</span>
                            <span class="stat-label">Local Time</span>
                        </div>
                    </div>
                    <div class="stat-box">
                        <i class="fa-solid fa-cloud-sun"></i>
                        <div>
                            <span class="stat-val" id="temp">--°F</span>
                            <span class="stat-label" id="cond">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const card = document.getElementById('tilt-card');
        const container = document.getElementById('tilt-container');
        const menu = document.getElementById('context-menu');

        // Custom Right Click
        window.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            menu.style.display = 'block';
            let x = e.clientX,
                y = e.clientY;
            if (x + 180 > window.innerWidth) x -= 180;
            if (y + 150 > window.innerHeight) y -= 150;
            menu.style.left = `${x}px`;
            menu.style.top = `${y}px`;
        });

        // Close menu & Ripple effect
        window.addEventListener('click', (e) => {
            menu.style.display = 'none';
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = `${e.clientX}px`;
            ripple.style.top = `${e.clientY}px`;
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
        });

        // 3D Tilt Logic
        container.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            card.style.setProperty('--mouse-x', `${(x / rect.width) * 100}%`);
            card.style.setProperty('--mouse-y', `${(y / rect.height) * 100}%`);
            if (window.innerWidth > 768) {
                const rotateX = (y - (rect.height / 2)) / 25;
                const rotateY = ((rect.width / 2) - x) / 25;
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            }
        });

        container.addEventListener('mouseleave', () => {
            card.style.transition = "transform 0.8s cubic-bezier(0.23, 1, 0.32, 1)";
            card.style.transform = `rotateX(0deg) rotateY(0deg)`;
            setTimeout(() => {
                card.style.transition = "transform 0.1s ease-out";
            }, 800);
        });

        // Fixed Typewriter
        const phrases = ["Modern UI", "Web Apps", "Cybersecurity", "Scratch ", "JavaScript"];
        let i = 0,
            j = 0,
            isDeleting = false;

        function loop() {
            const target = document.getElementById("typewriter");
            const currentWord = phrases[i];
            target.textContent = currentWord.substring(0, j);
            if (isDeleting) {
                j--;
            } else {
                j++;
            }
            if (!isDeleting && j > currentWord.length) {
                isDeleting = true;
                setTimeout(loop, 2000);
            } else if (isDeleting && j < 0) {
                isDeleting = false;
                i = (i + 1) % phrases.length;
                j = 0;
                setTimeout(loop, 500);
            } else {
                setTimeout(loop, isDeleting ? 40 : 90);
            }
        }
        loop();

        // Time
        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Weather Fetch
        async function fetchWeather() {
            try {
                const res = await fetch('https://api.weather.gov/points/43.1939,-71.5724');
                const data = await res.json();
                const forecastRes = await fetch(data.properties.forecastHourly);
                const forecastData = await forecastRes.json();
                const current = forecastData.properties.periods[0];
                document.getElementById('temp').textContent = `${current.temperature}°F`;
                document.getElementById('cond').textContent = current.shortForecast;
            } catch (e) {
                document.getElementById('temp').textContent = "72°F";
                document.getElementById('cond').textContent = "Clear Skies";
            }
        }
        fetchWeather();
    </script>
</body>

</html>
