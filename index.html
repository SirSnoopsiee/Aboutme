<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SirSnoopy | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="bg-overlay"></div>
    <video id="bg-video" autoplay muted loop playsinline>
        <source src="your-video-link.mp4" type="video/mp4">
    </video>

    <div class="container" id="tilt-container">
        <main class="card" id="tilt-card">
            <div class="card-glow" id="glow"></div>

            <section class="profile-section">
                <div class="pfp-outer">
                    <div class="pfp-inner">
                        <img src="https://raw.githubusercontent.com/code-andrewy/jumpman64beta/main/cat-pfp.jpg" alt="Profile" class="pfp-img">
                    </div>
                </div>
                
                <div class="social-row"></div>
            </section>

            <section class="content-section">
                <header>
                    <p class="greeting">Hello 👋 My name is</p>
                    <div class="name-logo">
                        <div class="logo-row">
                            <span class="element-box">S<small>16</small></span>
                            <span class="logo-text">ir</span>
                        </div>
                        <div class="logo-row">
                            <span class="element-box">S<small>16</small></span>
                            <span class="logo-text">noop</span>
                            <span class="element-box">Y<small>39</small></span>
                        </div>
                    </div>
                </header>

                <div class="typewriter-wrap">
                    Experience in <span id="typewriter"></span>
                </div>

                <div class="bio">
                    A student who started coding at age 12. I make and find cool stuff. I also like snoopy :O
                </div>

                <div class="info-grid">
                    <div class="stat-box">
                        <i class="fa-regular fa-clock"></i>
                        <span id="time">00:00 AM</span>
                        <small>Local Time</small>
                    </div>
                    <div class="stat-box">
                        <i class="fa-solid fa-cloud-sun"></i>
                        <span id="temp">--°F</span>
                        <span id="cond">Loading...</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="context-menu">
        <div class="menu-item"><i class="fa-solid fa-house"></i> Home</div>
        <div class="menu-item"><i class="fa-solid fa-code"></i> Projects</div>
        <div class="menu-item"><i class="fa-solid fa-share-nodes"></i> Share</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
